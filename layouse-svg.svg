<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58A6FF"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#22C55E"/>
    </linearGradient>

    <linearGradient id="fadeLeft" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0D1117" stop-opacity="0.75"/>
      <stop offset="50%" stop-color="#0D1117" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0D1117" stop-opacity="0"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- BACKGROUND IMAGE -->
  <image
    href="data:image/png;base64,PUT_BASE64_HERE"
    x="0"
    y="0"
    width="1200"
    height="320"
    preserveAspectRatio="xMidYMid slice"
  />

  <!-- LEFT FADE -->
  <rect width="700" height="320" fill="url(#fadeLeft)" />

  <!-- GLASS PANEL -->
  <rect x="70" y="60" width="500" height="200" rx="20"
        fill="#0D1117" opacity="0.55" stroke="#30363D"/>

  <!-- TITLE -->
  <text x="100" y="120"
        font-size="52"
        font-family="monospace"
        fill="url(#neon)"
        filter="url(#glow)">
    LAYOUSE
  </text>

  <!-- SUBTITLE -->
  <text x="100" y="150"
        font-size="16"
        fill="#C9D1D9"
        font-family="monospace">
    Frontend Developer • UI Engineer • Building fast & clean interfaces
  </text>

  <!-- TERMINAL -->
  <text x="100" y="190"
        fill="#58A6FF"
        font-family="monospace">
    layouse@dev:~$
  </text>

  <text x="100" y="210"
        fill="#C9D1D9"
        font-family="monospace">
    crafting smooth UIs && killing slow apps...
  </text>

  <!-- CURSOR -->
  <rect x="460" y="198" width="10" height="14" fill="#58A6FF">
    <animate attributeName="opacity"
             values="1;0;1"
             dur="1s"
             repeatCount="indefinite"/>
  </rect>

  <!-- RIGHT PANEL -->
  <rect x="780" y="80" width="320" height="160" rx="15"
        fill="#0D1117" opacity="0.35" stroke="#30363D"/>

  <text x="800" y="110"
        fill="#58A6FF"
        font-family="monospace">
    LIVE METRICS
  </text>

  <!-- BARS -->
  <rect x="800" y="130" width="200" height="6" fill="#30363D"/>
  <rect x="800" y="130" width="185" height="6" fill="#22C55E"/>
  <text x="1010" y="135" font-size="10" fill="#22C55E" font-family="monospace">FPS ↑</text>

  <rect x="800" y="150" width="200" height="6" fill="#30363D"/>
  <rect x="800" y="150" width="165" height="6" fill="#58A6FF"/>
  <text x="1010" y="155" font-size="10" fill="#58A6FF" font-family="monospace">UX</text>

  <rect x="800" y="170" width="200" height="6" fill="#30363D"/>
  <rect x="800" y="170" width="175" height="6" fill="#8B5CF6"/>
  <text x="1010" y="175" font-size="10" fill="#8B5CF6" font-family="monospace">DX</text>

</svg>
