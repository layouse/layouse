<svg width="1000" height="300" viewBox="0 0 1000 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradyanlar -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b0f1c"/>
      <stop offset="60%" stop-color="#1a1f35"/>
      <stop offset="100%" stop-color="#2a1f3d"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e2a3a"/>
      <stop offset="100%" stop-color="#0f1520"/>
    </linearGradient>
    <linearGradient id="building1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2c3e50"/>
      <stop offset="100%" stop-color="#34495e"/>
    </linearGradient>
    <linearGradient id="building2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a2634"/>
      <stop offset="100%" stop-color="#2c3e50"/>
    </linearGradient>
    <linearGradient id="building3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b2e4a"/>
      <stop offset="100%" stop-color="#2a1f3d"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f9a8d4" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#f9a8d4" stop-opacity="0"/>
    </linearGradient>
    <!-- Filtreler -->
    <filter id="glowFilter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Arka plan gökyüzü -->
  <rect width="1000" height="300" fill="url(#sky)"/>

  <!-- Yıldızlar (commit katkıları gibi parlayan noktalar) -->
  <g filter="url(#softGlow)" opacity="0.8">
    <circle cx="50" cy="40" r="1.5" fill="#f9a8d4"/>
    <circle cx="120" cy="25" r="1.2" fill="#c084fc"/>
    <circle cx="200" cy="60" r="2" fill="#fde68a"/>
    <circle cx="280" cy="30" r="1.8" fill="#a5b4fc"/>
    <circle cx="350" cy="45" r="1.4" fill="#f9a8d4"/>
    <circle cx="430" cy="20" r="2.2" fill="#c084fc"/>
    <circle cx="510" cy="55" r="1.6" fill="#fde68a"/>
    <circle cx="590" cy="35" r="2" fill="#a5b4fc"/>
    <circle cx="670" cy="50" r="1.5" fill="#f9a8d4"/>
    <circle cx="750" cy="28" r="1.8" fill="#c084fc"/>
    <circle cx="830" cy="42" r="2.2" fill="#fde68a"/>
    <circle cx="910" cy="30" r="1.4" fill="#a5b4fc"/>
    <circle cx="960" cy="55" r="1.6" fill="#f9a8d4"/>
    <!-- Daha fazla yıldız -->
    <circle cx="80" cy="80" r="1" fill="#f9a8d4"/>
    <circle cx="160" cy="95" r="1.2" fill="#c084fc"/>
    <circle cx="240" cy="75" r="0.8" fill="#fde68a"/>
    <circle cx="320" cy="85" r="1.1" fill="#a5b4fc"/>
    <circle cx="400" cy="65" r="1.3" fill="#f9a8d4"/>
    <circle cx="480" cy="90" r="0.9" fill="#c084fc"/>
    <circle cx="560" cy="70" r="1.4" fill="#fde68a"/>
    <circle cx="640" cy="80" r="1" fill="#a5b4fc"/>
    <circle cx="720" cy="65" r="1.2" fill="#f9a8d4"/>
    <circle cx="800" cy="85" r="1.1" fill="#c084fc"/>
    <circle cx="880" cy="75" r="1.5" fill="#fde68a"/>
    <circle cx="940" cy="90" r="0.8" fill="#a5b4fc"/>
  </g>

  <!-- Bazı yıldızlara yanıp sönme animasyonu -->
  <circle cx="430" cy="20" r="2.2" fill="#c084fc" filter="url(#softGlow)">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="830" cy="42" r="2.2" fill="#fde68a" filter="url(#softGlow)">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="280" cy="30" r="1.8" fill="#a5b4fc" filter="url(#softGlow)">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Silüet: Arkada uzaktaki dağlar / tepeler (Kocaeli tepeleri) -->
  <path d="M0 230 Q80 190 150 220 Q200 180 280 210 Q350 170 420 200 Q500 160 580 190 Q650 170 730 210 Q800 180 880 200 Q950 170 1000 190 L1000 300 L0 300 Z" fill="#131a2a" opacity="0.7"/>

  <!-- Şehir silüeti (İstanbul ve Kocaeli karışımı) -->
  <g>
    <!-- Bina 1 – cami minaresi (İstanbul) -->
    <rect x="60" y="200" width="20" height="80" fill="url(#building1)" rx="2"/>
    <rect x="68" y="180" width="4" height="20" fill="#34495e"/>
    <circle cx="70" cy="178" r="3" fill="#f9a8d4" filter="url(#glowFilter)">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
    </circle>
    <!-- minare şerefesi -->
    <rect x="62" y="195" width="16" height="4" fill="#2c3e50"/>
    <rect x="62" y="210" width="16" height="4" fill="#2c3e50"/>

    <!-- Bina 2 – modern cam (Kocaeli sanayi) -->
    <rect x="100" y="170" width="35" height="110" fill="url(#building2)" rx="2"/>
    <rect x="105" y="175" width="10" height="12" fill="#fde68a" opacity="0.7">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="120" y="175" width="10" height="12" fill="#fde68a" opacity="0.5"/>
    <rect x="105" y="195" width="10" height="12" fill="#fde68a" opacity="0.8"/>
    <rect x="120" y="195" width="10" height="12" fill="#fde68a" opacity="0.6"/>
    <rect x="105" y="215" width="10" height="12" fill="#fde68a" opacity="0.7"/>
    <rect x="120" y="215" width="10" height="12" fill="#fde68a" opacity="0.4"/>
    <!-- anten -->
    <rect x="115" y="158" width="4" height="12" fill="#2c3e50"/>
    <circle cx="117" cy="156" r="2" fill="#f9a8d4" filter="url(#glowFilter)"/>

    <!-- Bina 3 – yüksek konut (İstanbul) -->
    <rect x="155" y="140" width="30" height="140" fill="url(#building3)" rx="2"/>
    <!-- pencereler -->
    <rect x="160" y="148" width="6" height="8" fill="#fde68a" opacity="0.6"/>
    <rect x="172" y="148" width="6" height="8" fill="#fde68a" opacity="0.8"/>
    <rect x="160" y="162" width="6" height="8" fill="#fde68a" opacity="0.4"/>
    <rect x="172" y="162" width="6" height="8" fill="#fde68a" opacity="0.7"/>
    <rect x="160" y="176" width="6" height="8" fill="#fde68a" opacity="0.9"/>
    <rect x="172" y="176" width="6" height="8" fill="#fde68a" opacity="0.5"/>
    <rect x="160" y="190" width="6" height="8" fill="#fde68a" opacity="0.7"/>
    <rect x="172" y="190" width="6" height="8" fill="#fde68a" opacity="0.6"/>

    <!-- Bina 4 – 42 Ecole binası (farklı mimari) -->
    <g transform="translate(210, 120)">
      <!-- Ana kütle -->
      <rect x="0" y="40" width="45" height="140" fill="#2a1f3d" rx="3" stroke="#c084fc" stroke-width="1.5"/>
      <!-- Çatı terası -->
      <rect x="-5" y="35" width="55" height="10" fill="#3b2e4a" rx="2"/>
      <!-- 42 yazısı (minimal) -->
      <text x="22" y="58" text-anchor="middle" fill="#c084fc" font-family="monospace" font-size="16" font-weight="bold" filter="url(#glowFilter)">42</text>
      <!-- Pencereler (farklı dizilim) -->
      <rect x="8" y="70" width="10" height="14" fill="#a5b4fc" opacity="0.6"/>
      <rect x="26" y="70" width="10" height="14" fill="#a5b4fc" opacity="0.8"/>
      <rect x="8" y="94" width="10" height="14" fill="#a5b4fc" opacity="0.4"/>
      <rect x="26" y="94" width="10" height="14" fill="#a5b4fc" opacity="0.7"/>
      <rect x="8" y="118" width="10" height="14" fill="#a5b4fc" opacity="0.9"/>
      <rect x="26" y="118" width="10" height="14" fill="#a5b4fc" opacity="0.5"/>
      <!-- Işıklı 42 amblemi -->
      <circle cx="22" cy="170" r="6" fill="#f9a8d4" filter="url(#glowFilter)">
        <animate attributeName="r" values="5;7;5" dur="1.5s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Bina 5 – Boğaz köprüsü esintisi (İstanbul) -->
    <g transform="translate(280, 180)">
      <!-- Köprü ayakları -->
      <rect x="0" y="20" width="8" height="80" fill="#34495e"/>
      <rect x="60" y="20" width="8" height="80" fill="#34495e"/>
      <!-- Köprü tablası -->
      <rect x="-5" y="20" width="80" height="6" fill="#2c3e50"/>
      <!-- Kablo tutucular (üçgen) -->
      <line x1="4" y1="0" x2="0" y2="20" stroke="#4a6170" stroke-width="1.5"/>
      <line x1="4" y1="0" x2="30" y2="20" stroke="#4a6170" stroke-width="1.5"/>
      <line x1="68" y1="0" x2="40" y2="20" stroke="#4a6170" stroke-width="1.5"/>
      <line x1="68" y1="0" x2="68" y2="20" stroke="#4a6170" stroke-width="1.5"/>
      <!-- Aydınlatma -->
      <circle cx="4" cy="0" r="2" fill="#fde68a" filter="url(#glowFilter)">
        <animate attributeName="opacity" values="0.5;1;0.5" dur="1.8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="68" cy="0" r="2" fill="#fde68a" filter="url(#glowFilter)">
        <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Bina 6 – Kocaeli fabrika bacaları -->
    <rect x="380" y="180" width="12" height="80" fill="#1a2634" rx="1"/>
    <rect x="400" y="190" width="14" height="70" fill="#1a2634" rx="1"/>
    <rect x="420" y="185" width="10" height="75" fill="#1a2634" rx="1"/>
    <!-- duman -->
    <circle cx="386" cy="170" r="8" fill="#f9a8d4" opacity="0.15">
      <animate attributeName="cy" values="170;150;130" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.05;0" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="407" cy="175" r="10" fill="#c084fc" opacity="0.1">
      <animate attributeName="cy" values="175;155;135" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.15;0.05;0" dur="5s" repeatCount="indefinite"/>
    </circle>

    <!-- Bina 7 – İstanbul'dan tarihi yapı (kubbe) -->
    <rect x="460" y="160" width="40" height="100" fill="url(#building1)" rx="2"/>
    <path d="M460 160 Q480 130 500 160 Z" fill="#2c3e50"/>
    <circle cx="480" cy="140" r="6" fill="#fde68a" filter="url(#glowFilter)">
      <animate attributeName="r" values="5;7;5" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <!-- pencereler -->
    <rect x="468" y="180" width="8" height="10" fill="#fde68a" opacity="0.7"/>
    <rect x="484" y="180" width="8" height="10" fill="#fde68a" opacity="0.5"/>
    <rect x="468" y="200" width="8" height="10" fill="#fde68a" opacity="0.9"/>
    <rect x="484" y="200" width="8" height="10" fill="#fde68a" opacity="0.6"/>

    <!-- Bina 8 – modern ofis (cam) -->
    <rect x="520" y="130" width="35" height="130" fill="url(#building2)" rx="2"/>
    <rect x="525" y="138" width="8" height="10" fill="#a5b4fc" opacity="0.8"/>
    <rect x="540" y="138" width="8" height="10" fill="#a5b4fc" opacity="0.6"/>
    <rect x="525" y="156" width="8" height="10" fill="#a5b4fc" opacity="0.7"/>
    <rect x="540" y="156" width="8" height="10" fill="#a5b4fc" opacity="0.9"/>
    <rect x="525" y="174" width="8" height="10" fill="#a5b4fc" opacity="0.5"/>
    <rect x="540" y="174" width="8" height="10" fill="#a5b4fc" opacity="0.7"/>

    <!-- Bina 9 – yüksek rezidans (Kocaeli) -->
    <rect x="575" y="110" width="28" height="150" fill="url(#building3)" rx="2"/>
    <rect x="580" y="118" width="6" height="8" fill="#fde68a" opacity="0.6"/>
    <rect x="592" y="118" width="6" height="8" fill="#fde68a" opacity="0.8"/>
    <rect x="580" y="134" width="6" height="8" fill="#fde68a" opacity="0.4"/>
    <rect x="592" y="134" width="6" height="8" fill="#fde68a" opacity="0.7"/>
    <rect x="580" y="150" width="6" height="8" fill="#fde68a" opacity="0.9"/>
    <rect x="592" y="150" width="6" height="8" fill="#fde68a" opacity="0.5"/>
    <rect x="580" y="166" width="6" height="8" fill="#fde68a" opacity="0.7"/>
    <rect x="592" y="166" width="6" height="8" fill="#fde68a" opacity="0.6"/>

    <!-- Bina 10 – İstanbul Boğaz kıyısı yalı -->
    <rect x="620" y="190" width="50" height="70" fill="#2a1f3d" rx="2"/>
    <rect x="625" y="195" width="12" height="15" fill="#fde68a" opacity="0.7"/>
    <rect x="645" y="195" width="12" height="15" fill="#fde68a" opacity="0.5"/>
    <rect x="625" y="218" width="12" height="15" fill="#fde68a" opacity="0.9"/>
    <rect x="645" y="218" width="12" height="15" fill="#fde68a" opacity="0.6"/>
    <!-- çatı -->
    <path d="M620 190 L645 170 L670 190 Z" fill="#34495e"/>

    <!-- Bina 11 – 42 Ecole yan bina (ek) -->
    <rect x="690" y="150" width="30" height="110" fill="#3b2e4a" rx="2" stroke="#c084fc" stroke-width="1"/>
    <text x="705" y="170" text-anchor="middle" fill="#c084fc" font-family="monospace" font-size="12" filter="url(#glowFilter)">42</text>
    <rect x="695" y="185" width="8" height="10" fill="#a5b4fc" opacity="0.7"/>
    <rect x="707" y="185" width="8" height="10" fill="#a5b4fc" opacity="0.5"/>
    <rect x="695" y="203" width="8" height="10" fill="#a5b4fc" opacity="0.8"/>
    <rect x="707" y="203" width="8" height="10" fill="#a5b4fc" opacity="0.6"/>

    <!-- Bina 12 – Kocaeli OSB (büyük fabrika) -->
    <rect x="740" y="170" width="60" height="90" fill="#1a2634" rx="2"/>
    <rect x="745" y="178" width="10" height="12" fill="#fde68a" opacity="0.7"/>
    <rect x="762" y="178" width="10" height="12" fill="#fde68a" opacity="0.5"/>
    <rect x="780" y="178" width="10" height="12" fill="#fde68a" opacity="0.8"/>
    <rect x="745" y="198" width="10" height="12" fill="#fde68a" opacity="0.6"/>
    <rect x="762" y="198" width="10" height="12" fill="#fde68a" opacity="0.9"/>
    <rect x="780" y="198" width="10" height="12" fill="#fde68a" opacity="0.4"/>
    <!-- bacalar -->
    <rect x="748" y="158" width="6" height="12" fill="#2c3e50"/>
    <rect x="775" y="150" width="8" height="20" fill="#2c3e50"/>
    <rect x="790" y="160" width="5" height="10" fill="#2c3e50"/>

    <!-- Bina 13 – son yalı -->
    <rect x="820" y="195" width="40" height="65" fill="#2a1f3d" rx="2"/>
    <rect x="825" y="200" width="10" height="12" fill="#fde68a" opacity="0.8"/>
    <rect x="842" y="200" width="10" height="12" fill="#fde68a" opacity="0.6"/>
    <rect x="825" y="220" width="10" height="12" fill="#fde68a" opacity="0.5"/>
    <rect x="842" y="220" width="10" height="12" fill="#fde68a" opacity="0.7"/>
    <path d="M820 195 L840 178 L860 195 Z" fill="#34495e"/>

    <!-- Bina 14 – küçük cami minaresi (uzak) -->
    <rect x="880" y="210" width="14" height="50" fill="#2c3e50" rx="1"/>
    <rect x="886" y="195" width="2" height="15" fill="#2c3e50"/>
    <circle cx="887" cy="193" r="2" fill="#f9a8d4" filter="url(#glowFilter)"/>
    <rect x="882" y="205" width="10" height="3" fill="#2c3e50"/>

    <!-- Bina 15 – yüksek cam bina -->
    <rect x="910" y="140" width="25" height="120" fill="url(#building2)" rx="2"/>
    <rect x="915" y="148" width="6" height="8" fill="#a5b4fc" opacity="0.7"/>
    <rect x="925" y="148" width="6" height="8" fill="#a5b4fc" opacity="0.9"/>
    <rect x="915" y="164" width="6" height="8" fill="#a5b4fc" opacity="0.5"/>
    <rect x="925" y="164" width="6" height="8" fill="#a5b4fc" opacity="0.8"/>
    <rect x="915" y="180" width="6" height="8" fill="#a5b4fc" opacity="0.6"/>
    <rect x="925" y="180" width="6" height="8" fill="#a5b4fc" opacity="0.7"/>
  </g>

  <!-- Zemin (kod satırları veya grid) -->
  <rect x="0" y="280" width="1000" height="20" fill="url(#ground)"/>
  <g opacity="0.3" font-family="monospace" font-size="8" fill="#a5b4fc">
    <text x="10" y="292">{ commit: 'feat', message: 'add city' }</text>
    <text x="280" y="292">const istanbul = new City();</text>
    <text x="540" y="292">git push --force istanbul/kocaeli</text>
    <text x="780" y="292">// 42 Ecole style guide</text>
  </g>

  <!-- Başlık ve etiketler -->
  <text x="500" y="50" text-anchor="middle" font-family="monospace" font-size="32" font-weight="bold" fill="#f9a8d4" filter="url(#glowFilter)">
    🌆 Commit City
  </text>
  <text x="500" y="80" text-anchor="middle" font-family="monospace" font-size="14" fill="#c084fc" filter="url(#softGlow)">
    İstanbul · Kocaeli · 42 Ecole
  </text>
  <text x="500" y="100" text-anchor="middle" font-family="monospace" font-size="10" fill="#a5b4fc" opacity="0.8">
    Her commit bir tuğla, her repo bir cadde
  </text>

  <!-- Uçan kuş / ışık efektleri -->
  <g>
    <path d="M120 70 Q130 60 140 70 Q130 68 120 70" stroke="#f9a8d4" stroke-width="1.5" fill="none" opacity="0.6">
      <animateTransform attributeName="transform" type="translate" values="0,0; 200,-30; 400,-10; 600,20; 800,0" dur="10s" repeatCount="indefinite"/>
    </path>
    <path d="M150 80 Q160 70 170 80 Q160 78 150 80" stroke="#c084fc" stroke-width="1.5" fill="none" opacity="0.5">
      <animateTransform attributeName="transform" type="translate" values="0,0; 180,-20; 380,0; 580,15; 780,-5" dur="12s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Sağ alt köşeye küçük roket veya kod ikonu -->
  <g transform="translate(920, 240)" opacity="0.4">
    <rect x="0" y="0" width="30" height="20" rx="4" fill="#1a1f35" stroke="#c084fc" stroke-width="1"/>
    <text x="15" y="14" text-anchor="middle" fill="#c084fc" font-family="monospace" font-size="10">&lt;/&gt;</text>
  </g>

</svg>
