<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- 🌈 Neon gradient -->
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58A6FF"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#22C55E"/>
    </linearGradient>

    <!-- ✨ Glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 🧊 Glass -->
    <filter id="glass">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <!-- 🖼 BACKGROUND IMAGE SLOT -->
  <!-- buraya kendi görsel linkini koy -->
  <image href="YOUR_IMAGE_LINK_HERE" x="0" y="0" width="1200" height="320" preserveAspectRatio="xMidYMid slice"/>

  <!-- 🔳 overlay (okunabilirlik için hafif karartma) -->
  <rect width="100%" height="100%" fill="#0D1117" opacity="0.55"/>

  <!-- 🧊 Glass panel -->
  <rect x="70" y="60" width="500" height="200" rx="20" fill="#0D1117" opacity="0.6" stroke="#30363D"/>

  <!-- 🧠 Title -->
  <text x="100" y="120" font-size="52" font-family="monospace" fill="url(#neon)" filter="url(#glow)">
    LAYOUSE
  </text>

  <!-- Subtitle -->
  <text x="100" y="150" font-size="16" fill="#C9D1D9" font-family="monospace">
    Frontend Developer • System Thinker • Performance Focused
  </text>

  <!-- 💻 Terminal -->
  <text x="100" y="190" fill="#58A6FF" font-family="monospace">
    layouse@system:~$
  </text>

  <text x="100" y="210" fill="#C9D1D9" font-family="monospace">
    building scalable systems...
  </text>

  <!-- ⚡ Cursor -->
  <rect x="340" y="200" width="10" height="14" fill="#58A6FF">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- 📊 Right panel -->
  <rect x="780" y="80" width="320" height="160" rx="15" fill="#0D1117" opacity="0.6" stroke="#30363D"/>

  <text x="800" y="110" fill="#58A6FF" font-family="monospace">SYSTEM STATUS</text>

  <!-- bars -->
  <rect x="800" y="130" width="200" height="6" fill="#30363D"/>
  <rect x="800" y="130" width="180" height="6" fill="#22C55E"/>

  <rect x="800" y="150" width="200" height="6" fill="#30363D"/>
  <rect x="800" y="150" width="150" height="6" fill="#58A6FF"/>

  <rect x="800" y="170" width="200" height="6" fill="#30363D"/>
  <rect x="800" y="170" width="170" height="6" fill="#8B5CF6"/>

</svg>
